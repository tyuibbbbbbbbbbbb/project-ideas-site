<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ניהול - אתר הפרויקטים</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>🔧 ניהול אתר הפרויקטים</h1>
      <p><a href="/" class="header-link">→ חזרה לאתר</a></p>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <section id="login-section" class="card admin-login">
        <h2 class="card-title">כניסת מנהל</h2>
        <form id="login-form" class="idea-form">
          <div class="form-group">
            <label for="password">סיסמת ניהול</label>
            <input type="password" id="password" class="form-control" placeholder="הזן סיסמה" required />
          </div>
          <button type="submit" class="btn btn-primary">כניסה</button>
        </form>
      </section>

      <section id="admin-section" class="hidden">
        <h2 class="card-title">כל הרעיונות</h2>
        <div id="admin-list" class="admin-list"></div>
        <div id="admin-empty" class="empty-state hidden">
          <div class="empty-state-icon">📂</div>
          <div class="empty-state-title">אין רעיונות</div>
          <p>עדיין לא נוספו רעיונות לאתר</p>
        </div>
      </section>
    </div>
  </main>

  <div id="toast" class="toast"></div>
  <script src="admin.js"></script>
</body>
</html>
